{% extends "challenge.html" %}

{% block input %}
<div class="better-answers-container" style="max-height: 500px; overflow-y: auto; padding: 10px;">
    <input type="hidden" id="ba-challenge-id" value="{{ challenge.id }}">
    <hr>
    
    <table class="table table-bordered">
        <tbody id="ba-questions-container">
            <!-- Questions injected by view.js -->
        </tbody>
    </table>
    
    <div class="alert alert-danger better-answer-error" style="display: none;"></div>
    <div class="alert alert-success better-answer-success" style="display: none;"></div>
</div>
{% endblock %}

{% block submit %}
<!-- The standard submit button is intentionally hidden. Each custom question provides its own submit button inline. -->
{% endblock %}
