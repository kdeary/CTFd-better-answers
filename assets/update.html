<form method="POST">
	<div class="form-group">
		<label>
			Name<br>
			<small class="form-text text-muted">Challenge Name</small>
		</label>
		<input type="text" class="form-control chal-name" id="name" name="name" value="{{ challenge.name }}">
	</div>

	<div class="form-group">
		<label>
			Category<br>
			<small class="form-text text-muted">Challenge Category</small>
		</label>
		<input type="text" class="form-control chal-category" id="category" name="category" value="{{ challenge.category }}">
	</div>

	<div class="form-group">
		<label>
			Message<br>
			<small class="form-text text-muted">
				Use this to give a brief introduction to your challenge.
			</small>
		</label>
		<textarea id="description" class="form-control chal-desc-editor markdown" name="description" rows="10">{{ challenge.description }}</textarea>
	</div>
	
	<div class="form-group">
		<label>
			Max Attempts<br>
			<small class="form-text text-muted">Maximum amount of attempts for the challenge overall. Set internally by custom fields per-question instead.</small>
		</label>
		<input type="number" class="form-control chal-attempts" id="max_attempts" name="max_attempts" value="{{ challenge.max_attempts }}">
	</div>

	<div class="form-group">
		<label>
			State<br>
			<small class="form-text text-muted">Changes the state of the challenge (e.g. visible, hidden)</small>
		</label>
		<select class="form-control custom-select" id="state" name="state">
			<option value="visible" {% if challenge.state == 'visible' %}selected{% endif %}>Visible</option>
			<option value="hidden" {% if challenge.state == 'hidden' %}selected{% endif %}>Hidden</option>
		</select>
	</div>

	<input type="hidden" id="value" name="value" value="{{ challenge.value }}">
	<input type="hidden" name="type" value="better_answers">
	
	<hr>

	<!-- Custom Questions Container -->
	<div class="form-group">
		<label>Challenge Questions</label> <br>
		<small class="form-text text-muted">Total value is updated automatically based on sum of question points.</small>
		<div class="mt-3" id="questions-container">
			<!-- Dynamic questions list handled by JS -->
		</div>
		<div class="text-right">
			<button type="button" class="btn btn-outline-success btn-sm mt-2" id="add-question-btn">
				<i class="fa fa-plus"></i> Add Question
			</button>
		</div>
	</div>

	<hr>

	<div>
		<button id="submit-better-answers-update" class="btn btn-success btn-outlined float-right" type="button">
			Update
		</button>
	</div>
	
</form>

<style>
.question-item {
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #fdfdfd;
}
</style>

<template id="question-template">
    <div class="question-item p-3 mb-3" data-id="">
        <input type="hidden" class="question-id">
        <div class="row mb-2">
            <div class="col-md-4">
                <label class="small">Title</label>
                <input type="text" class="form-control question-title" placeholder="e.g. Q1" required>
            </div>
            <div class="col-md-2">
                <label class="small">Points</label>
                <input type="number" class="form-control question-points" placeholder="10" required>
            </div>
            <div class="col-md-3">
                <label class="small">Attempts limit</label>
                <input type="number" class="form-control question-attempts" placeholder="0 (Unltd.)">
            </div>
            <div class="col-md-3">
                <label class="small">Match Type</label>
                <select class="form-control question-category">
                    <option value="static">Static</option>
                    <option value="regex">Regex</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-10">
                <label class="small">Answer (Flag)</label>
                <input type="text" class="form-control question-answer" placeholder="Internal answer (not regex)" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-outline-danger btn-block remove-question-btn">
                    <i class="fa fa-trash"></i>
                </button>
            </div>
        </div>
    </div>
</template>
